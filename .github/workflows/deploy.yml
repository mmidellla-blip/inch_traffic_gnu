# PHP(그누보드) 사이트 — 빌드 단계 없이 저장소 내용을 FTPS로 서버에 동기화합니다.
# (npm/composer 등 로컬 빌드는 하지 않음; 서버는 PHP만 실행)
#
# GitHub → Settings → Secrets and variables → Actions:
#   FTP_HOST 또는 FTP_SERVER, FTP_USER, FTP_PASSWORD
#
# data/dbconfig.php 는 .gitignore 이므로 Git에는 없고, 서버에만 두는 것이 일반적입니다.
#
# FTP 타임아웃·접속 실패 시:
#   - 호스팅이 GitHub Actions IP 대역의 FTP를 막는 경우가 많음 → SSH/SFTP·셀프호스티드 러너 검토
#   - Hostinger 는 보통 FTPS(명시적 TLS, 포트 21) — protocol: ftps 유지

name: Deploy PHP (FTP)

on:
  push:
    branches: [main, master]

jobs:
  deploy:
    name: Sync to hosting
    runs-on: ubuntu-latest
    steps:
      - name: Check FTP secrets
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          HOST="${FTP_HOST:-$FTP_SERVER}"
          if [ -z "$HOST" ] || [ -z "$FTP_USER" ] || [ -z "$FTP_PASSWORD" ]; then
            echo "::error::Secrets에 FTP_HOST(또는 FTP_SERVER), FTP_USER, FTP_PASSWORD 를 모두 등록하세요. Settings → Secrets and variables → Actions"
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Upload via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_HOST || secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftps
          security: loose
          timeout: 120000
          local-dir: ./
          # FTP 루트가 이미 public_html 인 계정이 많음 → public_html/ 를 쓰면 중첩될 수 있음
          server-dir: ./
          exclude: |
            **/.git/**
            **/.github/**
            **/.vscode/**
            **/.cursor/**
            **/node_modules/**
            **/git_key
            **/Thumbs.db
            **/.DS_Store
