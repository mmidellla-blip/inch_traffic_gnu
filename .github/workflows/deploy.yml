# PHP(그누보드) — 빌드 없이 저장소를 FTPS(포트 21, explicit)로 동기화합니다.
#
# Secrets: FTP_HOST 또는 FTP_SERVER, FTP_USER, FTP_PASSWORD
# data/dbconfig.php 는 .gitignore → 서버에만 둠.
#
# --- "ECONNRESET" / "TLS connection was established" 오류 ---
# 1) 첫 배포·대량 업로드에서 잘 남. 우회: hPanel 파일 관리자로 *배포 대상 폴더*
#    (server-dir, 보통 public_html 또는 FTP 홈)에 빈 파일을 만듦:
#    파일 이름: .ftp-deploy-sync-state.json   내용 없음(0바이트) OK
#    → SamKirkland/FTP-Deploy-Action 이슈 #489/#510 등에서 보고된 방법.
# 2) 그래도 TLS 직후 끊기면: 호스팅이 GitHub Actions IP 대역을 막는 경우가 많음.
#    → Hostinger Git 연동, SSH(SFTP) 배포, 셀프호스티드 러너, 또는 PC에서 FileZilla 배포 검토.
# 3) protocol: ftps-legacy 는 implicit FTPS(보통 990)용이라 21 explicit Hostinger 와 섞지 말 것.

name: Deploy PHP (FTP)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    name: Sync to hosting
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check FTP secrets
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          HOST="${FTP_HOST:-$FTP_SERVER}"
          if [ -z "$HOST" ] || [ -z "$FTP_USER" ] || [ -z "$FTP_PASSWORD" ]; then
            echo "::error::Secrets에 FTP_HOST(또는 FTP_SERVER), FTP_USER, FTP_PASSWORD 를 모두 등록하세요."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Upload via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_HOST || secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftps
          security: loose
          timeout: 120000
          log-level: standard
          state-name: .ftp-deploy-sync-state.json
          local-dir: ./
          server-dir: ./
          exclude: |
            **/.git/**
            **/.github/**
            **/.vscode/**
            **/.cursor/**
            **/node_modules/**
            **/git_key
            **/Thumbs.db
            **/.DS_Store
